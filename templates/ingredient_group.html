{{define "ingredient_group"}}
<div class="ingredient-group" data-group-name="{{.Name}}">
    <div class="group-header">
        <span class="group-drag-handle" title="Drag to reorder group">☰</span>
        <input type="text" placeholder="Group name (e.g. Sauce, Filling)"
               value="{{.Name}}"
               class="group-name-input form-input"
               oninput="updateGroupIngredients(this)">
        <button type="button" onclick="removeGroup(this)"
                class="remove-btn" title="Remove group">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
            </svg>
        </button>
    </div>
    <div class="sortable-ingredients">
        {{range .Ingredients}}
        {{template "ingredient_row" .}}
        {{end}}
    </div>
    <button type="button" onclick="addIngredientToGroup(this)"
            class="add-link mt-2">+ Add Ingredient</button>
</div>
{{end}}
