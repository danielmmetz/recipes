{{define "title"}}{{if .IsEdit}}Edit{{else}}New{{end}} Recipe{{end}}
{{define "content"}}
<h1 class="text-2xl font-bold text-gray-900 mb-6">{{if .IsEdit}}Edit{{else}}New{{end}} Recipe</h1>
<form method="POST"
      {{if .IsEdit}}hx-put="/recipes/{{.Recipe.Slug}}" hx-target="body"{{else}}action="/recipes"{{end}}
      class="space-y-6">

    <div>
        <label for="title" class="block text-sm font-medium text-gray-700 mb-1">Title</label>
        <input type="text" name="title" id="title" required
               value="{{if .IsEdit}}{{.Recipe.Title}}{{end}}"
               class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>

    <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Ingredients</label>
        <div id="ingredients" class="space-y-2">
            {{range .Ingredients}}
            {{template "ingredient_row" .}}
            {{end}}
        </div>
        <button type="button"
                hx-get="/ingredients/row"
                hx-target="#ingredients"
                hx-swap="beforeend"
                class="mt-2 text-sm text-blue-600 hover:underline">+ Add Ingredient</button>
    </div>

    <div>
        <label for="instructions" class="block text-sm font-medium text-gray-700 mb-1">Instructions</label>
        <textarea name="instructions" id="instructions" rows="8" required
                  class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">{{if .IsEdit}}{{.Recipe.Instructions}}{{end}}</textarea>
    </div>

    <div class="flex gap-3">
        <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">
            {{if .IsEdit}}Update{{else}}Create{{end}} Recipe
        </button>
        <a href="{{if .IsEdit}}/recipes/{{.Recipe.Slug}}{{else}}/{{end}}" class="bg-gray-200 text-gray-700 px-4 py-2 rounded hover:bg-gray-300">Cancel</a>
    </div>
</form>
{{end}}
