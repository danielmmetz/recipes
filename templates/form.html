{{define "title"}}{{if .IsEdit}}Edit{{else}}New{{end}} Recipe{{end}}
{{define "content"}}
<h1 class="text-2xl font-bold text-gray-900 mb-6">{{if .IsEdit}}Edit{{else}}New{{end}} Recipe</h1>
<form method="POST"
      {{if .IsEdit}}hx-put="/recipes/{{.Recipe.Slug}}" hx-target="body"{{else}}action="/recipes"{{end}}
      class="space-y-6">

    <div>
        <label for="title" class="block text-sm font-medium text-gray-700 mb-1">Title</label>
        <input type="text" name="title" id="title" required
               value="{{if .IsEdit}}{{.Recipe.Title}}{{end}}"
               class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>

    <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Ingredients</label>

        <!-- Ungrouped ingredients -->
        <div id="ungrouped-ingredients" class="sortable-ingredients space-y-2{{if .UngroupedIngredients}} mb-3{{end}}">
            {{range .UngroupedIngredients}}
            {{template "ingredient_row" .}}
            {{end}}
        </div>
        <button type="button" onclick="addUngroupedIngredient()"
                class="mb-3 text-sm text-blue-600 hover:underline">+ Add Ingredient</button>

        <!-- Groups -->
        <div id="ingredient-groups" class="space-y-3 mb-3">
            {{range .Groups}}
            {{template "ingredient_group" .}}
            {{end}}
        </div>
        <button type="button" onclick="addGroup()"
                class="text-sm text-green-600 hover:underline">+ Add Group</button>
    </div>

    <div>
        <label for="instructions" class="block text-sm font-medium text-gray-700 mb-1">Instructions</label>
        <textarea name="instructions" id="instructions" rows="8" required
                  class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">{{if .IsEdit}}{{.Recipe.Instructions}}{{end}}</textarea>
    </div>

    <div class="flex gap-3">
        <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">
            {{if .IsEdit}}Update{{else}}Create{{end}} Recipe
        </button>
        <a href="{{if .IsEdit}}/recipes/{{.Recipe.Slug}}{{else}}/{{end}}" class="bg-gray-200 text-gray-700 px-4 py-2 rounded hover:bg-gray-300">Cancel</a>
    </div>
</form>

<script>
// Initialize sortable on all ingredient lists
function initSortable(el) {
    Sortable.create(el, {
        animation: 150,
        handle: '.drag-handle',
        group: 'ingredients',
        draggable: '.ingredient-row',
        ghostClass: 'bg-blue-50',
        onEnd: function() { updateAllGroupInputs(); }
    });
}

function initGroupSortable() {
    var el = document.getElementById('ingredient-groups');
    if (el) {
        Sortable.create(el, {
            animation: 150,
            handle: '.group-drag-handle',
            draggable: '.ingredient-group',
            ghostClass: 'bg-green-50',
        });
    }
}

function updateAllGroupInputs() {
    // Update ungrouped ingredients
    document.querySelectorAll('#ungrouped-ingredients .ingredient-row').forEach(function(row) {
        row.querySelector('input[name="ingredient_group[]"]').value = '';
    });
    // Update grouped ingredients
    document.querySelectorAll('.ingredient-group').forEach(function(group) {
        var name = group.querySelector('.group-name-input').value;
        group.querySelectorAll('.ingredient-row').forEach(function(row) {
            row.querySelector('input[name="ingredient_group[]"]').value = name;
        });
    });
}

function updateGroupIngredients(input) {
    var group = input.closest('.ingredient-group');
    var name = input.value;
    group.querySelectorAll('.ingredient-row input[name="ingredient_group[]"]').forEach(function(hidden) {
        hidden.value = name;
    });
}

function addUngroupedIngredient() {
    var container = document.getElementById('ungrouped-ingredients');
    var row = createIngredientRow('');
    container.appendChild(row);
}

function addIngredientToGroup(btn) {
    var group = btn.closest('.ingredient-group');
    var groupName = group.querySelector('.group-name-input').value;
    var container = group.querySelector('.sortable-ingredients');
    var row = createIngredientRow(groupName);
    container.appendChild(row);
}

function createIngredientRow(groupName) {
    var div = document.createElement('div');
    div.className = 'flex gap-2 items-center ingredient-row';
    div.innerHTML = '<span class="drag-handle cursor-grab text-gray-400 hover:text-gray-600 flex-shrink-0 select-none" title="Drag to reorder">☰</span>' +
        '<input type="number" name="quantity[]" step="any" placeholder="Qty" class="w-20 border border-gray-300 rounded px-2 py-1">' +
        '<select name="unit[]" class="w-28 h-[34px] border border-gray-300 rounded px-2 py-1 bg-white">' +
        '<option value="" selected>—</option>' +
        '<optgroup label="Volume">' +
        '<option value="tsp">tsp</option><option value="tbsp">tbsp</option><option value="fl oz">fl oz</option>' +
        '<option value="cup">cup</option><option value="pt">pt</option><option value="qt">qt</option>' +
        '<option value="gal">gal</option><option value="mL">mL</option><option value="L">L</option>' +
        '</optgroup>' +
        '<optgroup label="Weight">' +
        '<option value="oz">oz</option><option value="lb">lb</option>' +
        '<option value="g">g</option><option value="kg">kg</option>' +
        '</optgroup>' +
        '<optgroup label="Count / Other">' +
        '<option value="whole">whole</option><option value="pinch">pinch</option><option value="dash">dash</option>' +
        '<option value="clove">clove</option><option value="bunch">bunch</option><option value="sprig">sprig</option>' +
        '<option value="stick">stick</option>' +
        '</optgroup>' +
        '</select>' +
        '<input type="text" name="name[]" placeholder="Ingredient name" required class="flex-1 border border-gray-300 rounded px-2 py-1">' +
        '<input type="hidden" name="ingredient_group[]" value="' + groupName + '">' +
        '<button type="button" onclick="this.closest(\'.ingredient-row\').remove()" ' +
        'class="bg-red-500 hover:bg-red-600 text-white rounded w-7 h-7 flex items-center justify-center flex-shrink-0" title="Remove">' +
        '<svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M20 12H4" /></svg></button>';
    return div;
}

function addGroup() {
    var container = document.getElementById('ingredient-groups');
    var div = document.createElement('div');
    div.className = 'ingredient-group border border-gray-200 rounded-lg p-3 bg-white';
    div.innerHTML = '<div class="flex gap-2 items-center mb-2 pr-2">' +
        '<span class="group-drag-handle cursor-grab text-gray-400 hover:text-gray-600 flex-shrink-0 select-none text-lg" title="Drag to reorder group">☰</span>' +
        '<input type="text" placeholder="Group name (e.g. Sauce, Filling)" class="group-name-input flex-1 border border-gray-300 rounded px-2 py-1 font-medium" oninput="updateGroupIngredients(this)">' +
        '<button type="button" onclick="removeGroup(this)" class="bg-red-500 hover:bg-red-600 text-white rounded w-7 h-7 flex items-center justify-center flex-shrink-0" title="Remove group">' +
        '<svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>' +
        '</button></div>' +
        '<div class="sortable-ingredients space-y-2 min-h-[2.5rem] border border-dashed border-gray-200 rounded p-2"></div>' +
        '<button type="button" onclick="addIngredientToGroup(this)" class="mt-2 text-sm text-blue-600 hover:underline">+ Add Ingredient</button>';
    container.appendChild(div);
    initSortable(div.querySelector('.sortable-ingredients'));
}

function removeGroup(btn) {
    var group = btn.closest('.ingredient-group');
    // Move ingredients back to ungrouped
    var ungrouped = document.getElementById('ungrouped-ingredients');
    group.querySelectorAll('.ingredient-row').forEach(function(row) {
        row.querySelector('input[name="ingredient_group[]"]').value = '';
        ungrouped.appendChild(row);
    });
    group.remove();
}

// On page load
document.addEventListener('DOMContentLoaded', function() {
    document.querySelectorAll('.sortable-ingredients').forEach(initSortable);
    initGroupSortable();
});
</script>
{{end}}
