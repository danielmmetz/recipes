{{define "title"}}Recipes{{end}}
{{define "content"}}
<div class="flex justify-between items-center mb-6">
    <h1 class="text-2xl font-bold text-gray-900">All Recipes</h1>
    <a href="/recipes/new" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">New Recipe</a>
</div>
{{if .Recipes}}
<ul class="space-y-2">
    {{range .Recipes}}
    <li>
        <a href="/recipes/{{.Slug}}" class="block bg-white p-4 rounded shadow-sm hover:shadow-md transition">
            <span class="text-lg text-blue-600 hover:underline">{{.Title}}</span>
        </a>
    </li>
    {{end}}
</ul>
{{else}}
<p class="text-gray-500">No recipes yet. Create your first one!</p>
{{end}}
{{end}}
