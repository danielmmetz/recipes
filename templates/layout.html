<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{block "title" .}}Recipes{{end}}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js"></script>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #f8f7f4;
            --surface: #ffffff;
            --border: #e8e6e1;
            --border-light: #f3f2ee;
            --text: #2c2c2b;
            --text-secondary: #7c7b74;
            --text-muted: #9c9a93;
            --accent: #5c6b54;
            --accent-light: #c5cdbf;
            --accent-bg: #efeee9;
            --danger: #b91c1c;
            --danger-bg: #fef2f2;
            --danger-border: #fca5a5;
            --radius: 6px;
            --radius-full: 100px;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            font-size: 14px;
        }

        /* NAV */
        nav {
            background: var(--bg);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 10;
        }
        nav .inner {
            max-width: 700px;
            margin: 0 auto;
            padding: 13px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        nav .logo {
            font-family: 'Source Serif 4', serif;
            font-size: 20px;
            font-weight: 600;
            color: var(--text);
            text-decoration: none;
        }
        nav .new-btn {
            font-size: 12px;
            font-weight: 500;
            color: var(--accent);
            text-decoration: none;
            border: 1px solid var(--accent-light);
            padding: 5px 14px;
            border-radius: var(--radius-full);
            transition: all 0.15s;
        }
        nav .new-btn:hover {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        main {
            max-width: 700px;
            margin: 0 auto;
            padding: 28px 20px;
        }

        /* SHARED */
        .section-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        a { color: var(--accent); }
        a:hover { text-decoration: underline; }

        /* BUTTONS */
        .btn {
            display: inline-block;
            font-family: inherit;
            font-size: 12px;
            font-weight: 500;
            padding: 5px 14px;
            border-radius: var(--radius-full);
            border: 1px solid var(--border);
            background: none;
            color: var(--text-secondary);
            cursor: pointer;
            text-decoration: none;
            transition: all 0.12s;
        }
        .btn:hover {
            background: var(--accent-bg);
            color: var(--text);
            text-decoration: none;
        }
        .btn-primary {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }
        .btn-primary:hover {
            background: #4d5a46;
            border-color: #4d5a46;
            color: #fff;
        }
        .btn-danger:hover {
            color: var(--danger);
            border-color: var(--danger-border);
            background: var(--danger-bg);
        }

        /* TAGS */
        .tag-pill {
            font-size: 11px;
            background: var(--accent-bg);
            color: var(--text-secondary);
            padding: 2px 9px;
            border-radius: var(--radius-full);
            display: inline-flex;
            align-items: center;
            gap: 2px;
        }
        .tag-pill button {
            background: none;
            border: none;
            cursor: pointer;
            color: inherit;
            font-size: 14px;
            line-height: 1;
            padding: 0 1px;
        }
        .tag-pill button:hover { color: var(--text); }

        /* FORMS */
        .form-label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }
        .form-hint {
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 4px;
        }
        .form-input {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 7px 10px;
            font-family: inherit;
            font-size: 14px;
            color: var(--text);
            background: var(--surface);
            transition: border-color 0.12s, box-shadow 0.12s;
        }
        .form-input:focus {
            outline: none;
            border-color: var(--accent-light);
            box-shadow: 0 0 0 2px rgba(92, 107, 84, 0.12);
        }
        textarea.form-input { resize: vertical; }
        select.form-input { appearance: auto; }

        /* UTILITY */
        .flex { display: flex; }
        .gap-2 { gap: 8px; }
        .gap-1 { gap: 4px; }
        .items-center { align-items: center; }
        .flex-1 { flex: 1; }
        .flex-wrap { flex-wrap: wrap; }
        .justify-between { justify-content: space-between; }
        .mb-2 { margin-bottom: 8px; }
        .mb-3 { margin-bottom: 12px; }
        .mb-4 { margin-bottom: 16px; }
        .mb-6 { margin-bottom: 24px; }
        .mt-2 { margin-top: 8px; }
        .mt-3 { margin-top: 12px; }
        .space-y-2 > * + * { margin-top: 8px; }
        .space-y-6 > * + * { margin-top: 24px; }
        .min-h-10 { min-height: 2.5rem; }
        .w-20 { width: 5rem; }
        .w-28 { width: 7rem; }
        .shrink-0 { flex-shrink: 0; }
        .text-center { text-align: center; }
        .hidden { display: none !important; }
        .contents { display: contents; }
    </style>
    {{block "head" .}}{{end}}
</head>
<body>
    <nav>
        <div class="inner">
            <a href="/" class="logo">Recipes</a>
            <a href="/recipes/new" class="new-btn">+ New Recipe</a>
        </div>
    </nav>
    <main>
        {{block "content" .}}{{end}}
    </main>
</body>
</html>
