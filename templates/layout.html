<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{block "title" .}}Recipes{{end}}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js"></script>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #f8f7f4;
            --surface: #ffffff;
            --border: #e8e6e1;
            --border-light: #f3f2ee;
            --text: #2c2c2b;
            --text-secondary: #7c7b74;
            --text-muted: #9c9a93;
            --accent: #5c6b54;
            --accent-light: #c5cdbf;
            --accent-bg: #efeee9;
            --danger: #b91c1c;
            --danger-bg: #fef2f2;
            --danger-border: #fca5a5;
            --radius: 6px;
            --radius-full: 100px;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            font-size: 14px;
        }

        /* NAV */
        nav {
            background: var(--bg);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 10;
        }
        nav .inner {
            max-width: 700px;
            margin: 0 auto;
            padding: 13px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }
        nav .logo {
            font-family: 'Source Serif 4', serif;
            font-size: 20px;
            font-weight: 600;
            color: var(--text);
            text-decoration: none;
        }
        nav .new-btn {
            display: inline-flex;
            align-items: center;
            height: 30px;
            box-sizing: border-box;
            font-size: 12px;
            font-weight: 500;
            color: var(--accent);
            text-decoration: none;
            border: 1px solid var(--accent-light);
            padding: 0 14px;
            border-radius: var(--radius-full);
            transition: all 0.15s;
            white-space: nowrap;
        }
        nav .new-btn:hover {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }
        nav .new-btn.disabled {
            color: var(--text-muted);
            border-color: var(--border);
            cursor: not-allowed;
        }
        nav .new-btn.disabled:hover {
            background: none;
            color: var(--text-muted);
            border-color: var(--border);
        }
        nav .nav-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        nav .auth-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            height: 30px;
            width: 30px;
            box-sizing: border-box;
            color: var(--text-muted);
            text-decoration: none;
            transition: color 0.15s;
            background: none;
            border: none;
            padding: 0;
            cursor: pointer;
            font: inherit;
        }
        nav .auth-btn:hover { color: var(--accent); }
        nav .auth-btn.logged-in { color: var(--accent); }
        @media (max-width: 540px) {
            nav .inner { padding: 10px 14px; gap: 8px; }
            nav .nav-actions { gap: 5px; }
            nav .new-btn { padding: 0 10px; font-size: 11px; height: 28px; }
            nav .auth-btn { height: 28px; width: 28px; }
            nav .auth-btn svg { width: 18px; height: 18px; }
        }

        main {
            max-width: 700px;
            margin: 0 auto;
            padding: 28px 20px;
        }

        /* SHARED */
        .section-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        a { color: var(--accent); }
        a:hover { text-decoration: underline; }

        /* BUTTONS */
        .btn {
            display: inline-block;
            font-family: inherit;
            font-size: 12px;
            font-weight: 500;
            padding: 5px 14px;
            border-radius: var(--radius-full);
            border: 1px solid var(--border);
            background: none;
            color: var(--text-secondary);
            cursor: pointer;
            text-decoration: none;
            transition: all 0.12s;
        }
        .btn:hover {
            background: var(--accent-bg);
            color: var(--text);
            text-decoration: none;
        }
        .btn-primary {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }
        .btn-primary:hover {
            background: #4d5a46;
            border-color: #4d5a46;
            color: #fff;
        }
        .btn-danger:hover {
            color: var(--danger);
            border-color: var(--danger-border);
            background: var(--danger-bg);
        }

        /* TAGS */
        .tag-pill {
            font-size: 11px;
            background: var(--accent-bg);
            color: var(--text-secondary);
            padding: 2px 9px;
            border-radius: var(--radius-full);
            display: inline-flex;
            align-items: center;
            gap: 2px;
        }
        .tag-pill button {
            background: none;
            border: none;
            cursor: pointer;
            color: inherit;
            font-size: 14px;
            line-height: 1;
            padding: 0 1px;
        }
        .tag-pill button:hover { color: var(--text); }

        /* FORMS */
        .form-label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }
        .form-hint {
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 4px;
        }
        .form-input {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 7px 10px;
            font-family: inherit;
            font-size: 14px;
            color: var(--text);
            background: var(--surface);
            transition: border-color 0.12s, box-shadow 0.12s;
        }
        .form-input:focus {
            outline: none;
            border-color: var(--accent-light);
            box-shadow: 0 0 0 2px rgba(92, 107, 84, 0.12);
        }
        textarea.form-input { resize: vertical; }
        select.form-input { appearance: auto; }

        /* UTILITY */
        .flex { display: flex; }
        .gap-2 { gap: 8px; }
        .gap-1 { gap: 4px; }
        .items-center { align-items: center; }
        .flex-1 { flex: 1; }
        .flex-wrap { flex-wrap: wrap; }
        .justify-between { justify-content: space-between; }
        .mb-2 { margin-bottom: 8px; }
        .mb-3 { margin-bottom: 12px; }
        .mb-4 { margin-bottom: 16px; }
        .mb-6 { margin-bottom: 24px; }
        .mt-2 { margin-top: 8px; }
        .mt-3 { margin-top: 12px; }
        .space-y-2 > * + * { margin-top: 8px; }
        .space-y-6 > * + * { margin-top: 24px; }
        .min-h-10 { min-height: 2.5rem; }
        .w-20 { width: 5rem; }
        .w-28 { width: 7rem; }
        .shrink-0 { flex-shrink: 0; }
        .text-center { text-align: center; }
        .hidden { display: none !important; }
        .contents { display: contents; }

        /* Two-step delete confirmation: first click arms, second confirms. */
        .del-btn .ico-confirm { display: none; }
        .del-btn.confirming .ico-default { display: none; }
        .del-btn.confirming .ico-confirm { display: inline-flex; }
        .del-btn.confirming {
            background: var(--danger-bg) !important;
            border-color: var(--danger) !important;
            color: var(--danger) !important;
        }
    </style>
    {{block "head" .}}{{end}}
</head>
<body>
    <nav>
        <div class="inner">
            <a href="/" class="logo">Recipes</a>
            <div class="nav-actions">
                {{if .Auth.IsLoggedIn}}
                <a href="/trending" class="new-btn" style="border-color:var(--border);color:var(--text-secondary);">Trending</a>
                <a href="/me/logs" class="new-btn" style="border-color:var(--border);color:var(--text-secondary);">My Logs</a>
                {{end}}
                {{if .Auth.IsAdmin}}
                <a href="/recipes/new" class="new-btn">+ New Recipe</a>
                {{else if .AuthEnabled}}
                <span class="new-btn disabled" title="Only admins may create recipes">+ New Recipe</span>
                {{end}}
                {{if .AuthEnabled}}
                {{if .Auth.IsLoggedIn}}
                <form method="POST" action="/auth/logout" style="display:inline">
                    <button type="submit" class="auth-btn logged-in" title="Log out ({{.Auth.Name}})">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M5.636 5.636a9 9 0 1012.728 0M12 3v9" />
                        </svg>
                    </button>
                </form>
                {{else}}
                <a href="/auth/login" class="auth-btn" title="Log in">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z" />
                    </svg>
                </a>
                {{end}}
                {{end}}
            </div>
        </div>
    </nav>
    <main>
        {{block "content" .}}{{end}}
    </main>
    <script>
    // Two-step delete confirmation. First click on a .del-btn arms it (icon swaps,
    // background turns danger). Second click within 3s — or before clicking outside —
    // executes the delete via htmx using data-url / data-target / data-swap.
    function armDelete(btn) {
        if (btn.classList.contains('confirming')) {
            executeDelete(btn);
            return;
        }
        document.querySelectorAll('.del-btn.confirming').forEach(function(b) {
            if (b !== btn) {
                b.classList.remove('confirming');
                if (b._delTimer) clearTimeout(b._delTimer);
            }
        });
        btn.classList.add('confirming');
        btn._delTimer = setTimeout(function() {
            btn.classList.remove('confirming');
        }, 3000);
    }
    function executeDelete(btn) {
        var url = btn.dataset.url;
        if (!url) return;
        var targetSel = btn.dataset.target || 'closest:li';
        var swap = btn.dataset.swap || 'delete';
        var target;
        if (targetSel.indexOf('closest:') === 0) {
            target = btn.closest(targetSel.substring(8));
        } else {
            target = document.querySelector(targetSel);
        }
        if (!target) return;
        btn.classList.remove('confirming');
        if (btn._delTimer) clearTimeout(btn._delTimer);
        htmx.ajax('DELETE', url, { target: target, swap: swap });
    }
    document.addEventListener('click', function(e) {
        var btn = e.target.closest('.del-btn');
        if (btn) {
            e.preventDefault();
            armDelete(btn);
            return;
        }
        document.querySelectorAll('.del-btn.confirming').forEach(function(b) {
            b.classList.remove('confirming');
            if (b._delTimer) clearTimeout(b._delTimer);
        });
    });

    // Format YYYY-MM-DD as "May 9" (current year) or "May 9, 2024" — mirrors Go fmtCookedOn.
    function formatCookedOn(d) {
        if (!d) return '';
        var parts = d.split('-');
        if (parts.length !== 3) return d;
        var date = new Date(+parts[0], +parts[1] - 1, +parts[2]);
        if (isNaN(date.getTime())) return d;
        var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        var s = months[date.getMonth()] + ' ' + date.getDate();
        if (date.getFullYear() !== new Date().getFullYear()) {
            s += ', ' + date.getFullYear();
        }
        return s;
    }
    </script>
</body>
</html>
